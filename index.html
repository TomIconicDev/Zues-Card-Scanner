<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pokéscan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-900 text-white overflow-hidden touch-none">

    <div id="view-intro" class="view active flex flex-col items-center justify-center bg-black absolute inset-0 z-50 transition-opacity duration-1000">
        <i class="fa-solid fa-circle-notch fa-spin text-blue-400 text-6xl mb-4"></i>
        <h1 class="text-4xl font-bold tracking-widest text-white">POKÉSCAN</h1>
    </div>

    <div id="view-home" class="view hidden absolute inset-0 flex-col items-center justify-center p-6 bg-gradient-to-br from-slate-900 to-slate-800 transition-opacity duration-500">
        <h1 class="text-3xl font-bold tracking-wider mb-12 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">POKÉSCAN</h1>
        <div class="w-full max-w-sm space-y-6">
            <button onclick="navigateTo('scanner')" class="w-full glass-panel p-8 rounded-2xl flex flex-col items-center gap-4 active:scale-95 transition-transform">
                <i class="fa-solid fa-camera text-4xl text-blue-400"></i>
                <span class="text-xl font-semibold">Scan Cards</span>
            </button>
            <button onclick="navigateTo('collection')" class="w-full glass-panel p-8 rounded-2xl flex flex-col items-center gap-4 active:scale-95 transition-transform">
                <i class="fa-solid fa-book-open text-4xl text-purple-400"></i>
                <span class="text-xl font-semibold">My Binders</span>
            </button>
        </div>
    </div>

    <div id="view-scanner" class="view hidden absolute inset-0 bg-black flex-col transition-opacity duration-500">
        <div class="relative flex-1 overflow-hidden">
            <video id="camera-feed" autoplay playsinline class="absolute inset-0 w-full h-full object-cover"></video>
            <canvas id="capture-canvas" class="hidden"></canvas>
            
            <div class="absolute inset-8 border-2 border-white/30 rounded-xl pointer-events-none">
                <div id="scan-line" class="hidden scan-line"></div>
            </div>
            <div id="scanning-overlay" class="hidden absolute inset-0 bg-blue-500/40 backdrop-blur-sm flex flex-col items-center justify-center">
                <i class="fa-solid fa-microchip text-4xl text-white mb-4 animate-bounce"></i>
                <p id="scanning-text" class="text-white font-mono text-xl animate-pulse">Initializing Scanner...</p>
            </div>
        </div>
        <div class="h-32 bg-black flex items-center justify-between px-8 pb-6">
            <button onclick="navigateTo('home')" class="p-4 rounded-full glass-panel active:scale-95 transition-transform">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
            <button onclick="captureAndAnalyze()" id="capture-btn" class="p-6 rounded-full bg-white text-black mb-4 active:scale-95 transition-transform">
                <i class="fa-solid fa-camera text-3xl"></i>
            </button>
            <div class="w-14"></div> </div>
    </div>

    <div id="view-result" class="view hidden absolute inset-0 bg-slate-900 overflow-y-auto p-6 flex-col transition-opacity duration-500">
        <div class="flex-1 flex flex-col items-center justify-center mt-8">
            <img id="result-image" src="" class="w-3/4 max-w-sm rounded-xl shadow-2xl shadow-blue-500/20 mb-8 transition-transform duration-700 scale-95" />
            <div class="glass-panel w-full p-6 rounded-2xl mb-8">
                <h2 id="result-name" class="text-2xl font-bold">...</h2>
                <p id="result-set" class="text-gray-400">...</p>
                <div class="mt-4 grid grid-cols-2 gap-4">
                    <div class="bg-black/30 p-3 rounded-lg">
                        <span class="text-xs text-gray-500 block">Type</span>
                        <span id="result-type" class="font-semibold">...</span>
                    </div>
                    <div class="bg-black/30 p-3 rounded-lg">
                        <span class="text-xs text-gray-500 block">Est. Value</span>
                        <span id="result-value" class="font-semibold text-green-400">...</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="flex gap-4 pb-8">
            <button onclick="navigateTo('scanner')" class="flex-1 py-4 glass-panel rounded-xl font-bold active:scale-95 transition-transform">Discard</button>
            <button onclick="addToCollection()" class="flex-1 py-4 bg-blue-500 text-white rounded-xl font-bold shadow-lg shadow-blue-500/30 active:scale-95 transition-transform">Add to Binder</button>
        </div>
    </div>

    <div id="view-collection" class="view hidden absolute inset-0 bg-slate-900 overflow-y-auto p-6 transition-opacity duration-500">
        <div class="flex items-center gap-4 mt-8 mb-8">
            <button onclick="navigateTo('home')" class="p-3 glass-panel rounded-full active:scale-95 transition-transform">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <h2 class="text-2xl font-bold">Your Binders</h2>
        </div>
        <div id="collection-grid" class="space-y-8 pb-12 text-center text-gray-500">
            No cards scanned yet.
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
